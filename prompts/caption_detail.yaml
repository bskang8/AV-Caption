user_prompt: |
  Analyze this video and provide a comprehensive, chronological narrative. Start with the environmental setting (weather, road type, surroundings). Detail all significant driving events, including interactions with other vehicles (merging, overtaking), traffic signs, and maneuvers through intersections or roundabouts. Be sure to highlight any potential hazards or unusual situations, such as stalled vehicles, and describe how the ego-vehicle responds to them.